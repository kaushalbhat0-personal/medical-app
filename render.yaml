services:
  - type: web
    name: hospital-management-api
    runtime: python
    plan: free
    # Install all deps from requirements.txt, then verify email-validator (needed for pydantic EmailStr).
    buildCommand: "pip install -r requirements.txt && python -c \"import email_validator\""
    # Migrations before web server; PORT is set by Render in production.
    startCommand: bash -c "set -euo pipefail; alembic upgrade head; exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-10000}"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false  # Set manually after frontend deployment

databases:
  - name: hospital-db
    plan: free
    ipAllowList: []
